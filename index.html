<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamFlow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1EFE8;color:#1a1a1a;min-height:100vh}
:root{--purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;--teal:#0F6E56;--teal-light:#E1F5EE;--blue:#185FA5;--blue-light:#E6F1FB;--amber:#854F0B;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;--green:#3B6D11;--green-light:#EAF3DE;--border:#e2e0d8;--surface:#F7F6F2}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:#fff;border-bottom:1px solid var(--border);gap:12px;position:sticky;top:0;z-index:20}
.logo{font-size:15px;font-weight:600;color:var(--purple);letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.logo-sq{width:22px;height:22px;background:var(--purple);border-radius:5px;display:flex;align-items:center;justify-content:center}
.logo-sq svg{width:13px;height:13px;fill:#fff}
.topbar-right{display:flex;align-items:center;gap:8px}
.avatars{display:flex}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;border:2px solid #fff;margin-left:-7px;flex-shrink:0;cursor:default;position:relative}
.av:first-child{margin-left:0}
.av[data-name]:hover::after{content:attr(data-name);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:99}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.view-btn{padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;transition:all .12s}
.view-btn.active{background:var(--purple);color:#fff}
.btn{border:1px solid #d0cec8;background:#fff;color:#1a1a1a;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .12s}
.btn:hover{background:#f5f4f0}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-dark);border-color:var(--purple-dark)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:#f0efe9}
.btn-danger{color:var(--red);border-color:#f09595;background:#fff}
.btn-danger:hover{background:var(--red-light)}
.config-bar{background:var(--purple-light);border-bottom:1px solid #c4c0f0;padding:10px 20px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--purple-dark)}
.dash-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px 0}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.stat-val{font-size:24px;font-weight:600}
.board{display:flex;gap:12px;padding:16px 20px 24px;overflow-x:auto;align-items:flex-start}
.col{width:276px;flex-shrink:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column}
.col-head{padding:12px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-title{font-size:13px;font-weight:600;flex:1}
.col-count{font-size:11px;color:#888;background:#fff;border:1px solid var(--border);border-radius:100px;padding:1px 7px;font-weight:500}
.col-body{padding:0 8px 8px;min-height:80px}
.col-body.drag-over{background:rgba(83,74,183,.08);border-radius:8px;outline:2px dashed #AFA9EC;outline-offset:-4px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:grab;transition:border-color .15s,box-shadow .15s;user-select:none}
.card:hover{border-color:#b8b6c8;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.4;transform:scale(.96)}
.card.done-card .card-title{color:#888;text-decoration:line-through}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:500;line-height:1.45;flex:1}
.card-edit{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#bbb;font-size:15px;flex-shrink:0;transition:all .12s;border:none;background:transparent}
.card-edit:hover{background:#f0efe9;color:#555}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tag{padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500}
.tag-design{background:var(--purple-light);color:#3C3489}
.tag-dev{background:var(--blue-light);color:var(--blue)}
.tag-mkt{background:var(--amber-light);color:var(--amber)}
.tag-ops{background:var(--teal-light);color:var(--teal)}
.tag-urgent{background:var(--red-light);color:var(--red)}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.owner-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.mini-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;flex-shrink:0}
.date-chip{font-size:11px;color:#888}
.date-overdue{color:var(--red);font-weight:600}
.sub-bar{margin-top:8px}
.sub-track{height:3px;background:#ece9df;border-radius:2px;margin-bottom:4px}
.sub-fill{height:3px;border-radius:2px;background:var(--teal);transition:width .3s}
.sub-meta{display:flex;align-items:center;justify-content:space-between}
.sub-label{font-size:11px;color:#aaa}
.expand-btn{font-size:11px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:2px;background:none;border:none;font-family:inherit;padding:0}
.expand-btn:hover{color:#666}
.subtasks-list{margin-top:6px;border-top:1px solid #f0efe9;padding-top:6px;display:none}
.subtasks-list.open{display:block}
.sub-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;color:#666}
.sub-check{width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:8px;background:#fff;transition:all .12s}
.sub-check.done{background:var(--teal);border-color:var(--teal);color:#fff}
.sub-item.done .sub-text{text-decoration:line-through;color:#bbb}
.add-card-btn{margin:4px 8px 8px;padding:8px;border-radius:8px;border:1px dashed #ccc;font-size:12px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;background:transparent;font-family:inherit;width:calc(100% - 16px)}
.add-card-btn:hover{background:#fff;color:#666;border-color:#aaa}

/* ── GANTT ── */
.gantt-wrap{padding:16px 20px 24px}
.gantt-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.gantt-controls label{font-size:12px;color:#888;font-weight:500}
.gantt-controls input[type=date]{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;color:#1a1a1a}
.gantt-controls input[type=date]:focus{outline:none;border-color:var(--purple)}
.gantt-legend{display:flex;flex-wrap:wrap;gap:10px;margin-left:auto}
.gantt-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.gantt-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.gantt-container{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.gantt-header{display:flex;border-bottom:1px solid var(--border)}
.gantt-label-col{width:220px;flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;border-right:1px solid var(--border);background:var(--surface)}
.gantt-dates-header{flex:1;display:flex;overflow:hidden;position:relative;background:var(--surface)}
.gantt-day-head{flex-shrink:0;text-align:center;font-size:10px;color:#aaa;padding:4px 0;border-right:1px solid #f0efe9;font-weight:500}
.gantt-day-head.today-head{color:var(--purple);font-weight:700}
.gantt-day-head.weekend{background:#faf9f6}
.gantt-row{display:flex;border-bottom:1px solid #f5f4f0;min-height:44px;align-items:center}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:#faf9f6}
.gantt-task-label{width:220px;flex-shrink:0;padding:8px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.gantt-task-name{font-size:12px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-task-meta{display:flex;align-items:center;gap:5px}
.gantt-track{flex:1;position:relative;height:44px}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter .12s}
.gantt-bar:hover{filter:brightness(.92)}
.gantt-bar.done-bar{opacity:.5}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--purple);opacity:.35;pointer-events:none;z-index:2}
.gantt-empty{padding:40px;text-align:center;color:#aaa;font-size:13px}
.gantt-day-col{position:absolute;top:0;bottom:0;border-right:1px solid #f5f4f0}
.gantt-day-col.weekend{background:#faf9f6}
.gantt-day-col.today-col{background:rgba(83,74,183,.04)}
.gantt-month-label{position:absolute;top:0;font-size:10px;font-weight:600;color:#aaa;padding:4px 6px;pointer-events:none}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;padding:26px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:15px}
.form-label{font-size:11px;color:#888;font-weight:600;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-input{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;transition:border-color .12s}
.form-input:focus{outline:none;border-color:var(--purple)}
.tag-picker{display:flex;flex-wrap:wrap;gap:6px}
.tag-opt{padding:3px 10px;border-radius:100px;font-size:12px;cursor:pointer;border:2px solid transparent;font-weight:500;transition:border-color .12s,opacity .12s;opacity:.7}
.tag-opt.sel{border-color:currentColor;opacity:1}
.sub-input-row{display:flex;gap:6px;margin-top:8px}
.sub-input-row input{flex:1;padding:6px 9px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;color:#1a1a1a;font-family:inherit}
.sub-input-row input:focus{outline:none;border-color:var(--purple)}
.sub-input-row button{padding:6px 11px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit;transition:background .12s}
.sub-input-row button:hover{background:#f5f4f0}
.modal-sub-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f4f0;font-size:13px}
.modal-sub-item:last-child{border-bottom:none}
.modal-sub-check{width:16px;height:16px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;background:#fff}
.modal-sub-check.done{background:var(--teal);border-color:var(--teal);color:#fff}
.modal-sub-text{flex:1}
.modal-sub-del{width:20px;height:20px;border:none;background:none;cursor:pointer;color:#ccc;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:3px}
.modal-sub-del:hover{background:#f5f4f0;color:#888}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid #f0efe9}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:#aaa;font-size:14px;gap:8px}
.spinner{width:18px;height:18px;border:2px solid #ddd;border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.error-banner{background:var(--red-light);border:1px solid #f09595;color:var(--red);padding:10px 20px;font-size:13px;display:flex;align-items:center;gap:8px}
.settings-section{padding:20px;max-width:520px}
.settings-section h2{font-size:15px;font-weight:600;margin-bottom:12px}
.settings-section p{font-size:13px;color:#666;margin-bottom:10px;line-height:1.6}
.settings-section code{background:#f5f4f0;padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace}
.settings-input-row{display:flex;gap:8px;margin-bottom:8px}
.settings-input-row input{flex:1;padding:8px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}
.settings-input-row input:focus{outline:none;border-color:var(--purple)}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const COLS=[
  {id:'todo',title:'Da fare',color:'#888780'},
  {id:'doing',title:'In corso',color:'#185FA5'},
  {id:'review',title:'In review',color:'#BA7517'},
  {id:'done',title:'Fatto',color:'#0F6E56'},
];
const DEFAULT_TAGS=[
  {id:'design',label:'design',color:'#7F77DD'},
  {id:'dev',label:'dev',color:'#378ADD'},
  {id:'mkt',label:'marketing',color:'#EF9F27'},
  {id:'ops',label:'ops',color:'#1D9E75'},
  {id:'urgent',label:'urgente',color:'#E24B4A'},
];
let TAGS=DEFAULT_TAGS;
function loadTags(){try{const t=localStorage.getItem('tf_tags');if(t)TAGS=JSON.parse(t);}catch{}}
function saveTags(){localStorage.setItem('tf_tags',JSON.stringify(TAGS))}
function tagById(id){return TAGS.find(t=>t.id===id)}
function tagCss(color){
  // generate light bg and dark text from hex bar color
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  return {bg:`rgba(${r},${g},${b},0.12)`,text:color};
}
const DEFAULT_OWNERS=[
  {id:'owner1',name:'Tu',initials:'AZ',color:'#534AB7',bg:'#EEEDFE'},
  {id:'owner2',name:'Anna',initials:'LM',color:'#185FA5',bg:'#E6F1FB'},
  {id:'owner3',name:'Beppe',initials:'LP',color:'#0F6E56',bg:'#E1F5EE'},
];

function getCfg(){try{return JSON.parse(localStorage.getItem('tf_cfg')||'{}')}catch{return{}}}
function saveCfg(cfg){localStorage.setItem('tf_cfg',JSON.stringify(cfg))}

let S={
  cards:[],owners:DEFAULT_OWNERS,loading:true,error:null,
  modal:null,expanded:{},dragging:null,
  view:'board', // 'board'|'gantt'|'settings'
  draft:null,
  ganttStart:'',ganttEnd:'',
};
let dragSrcId=null;

function apiBase(){const c=getCfg();return`https://api.airtable.com/v0/${c.baseId}/${encodeURIComponent(c.tableName||'Tasks')}`}
function apiHeaders(){const c=getCfg();return{'Authorization':`Bearer ${c.token}`,'Content-Type':'application/json'}}
function isConfigured(){const c=getCfg();return !!(c.token&&c.baseId)}

function subField(fields){
  return fields.Subtasks||fields.subtasks||fields.Subtask||fields.subtask||'';
}

async function fetchCards(){
  if(!isConfigured()){S.loading=false;S.view='settings';render();return}
  S.loading=true;render();
  try{
    let all=[],offset=null;
    do{
      const url=apiBase()+(offset?`?offset=${offset}`:'');
      const r=await fetch(url,{headers:apiHeaders()});
      if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
      const d=await r.json();
      all=[...all,...d.records];
      offset=d.offset||null;
    }while(offset);
    S.cards=all.map(rec=>{
      let subs=[];
      const raw=subField(rec.fields);
      if(raw){try{subs=JSON.parse(raw)}catch{}}
      return{
        id:rec.id,
        title:rec.fields.Title||'',
        col:rec.fields.Column||'todo',
        owner:rec.fields.Owner||'owner1',
        due:rec.fields.Due||'',
        start:rec.fields.Start||'',
        tags:(rec.fields.Tags||'').split(',').filter(Boolean),
        subtasks:subs,
      };
    });
    S.error=null;
  }catch(e){S.error=e.message}
  S.loading=false;render();
}

async function createCard(data){
  if(!isConfigured()){S.cards.push({id:uid(),...data});render();toast('Card creata (locale)');return;}
  const r=await fetch(apiBase(),{method:'POST',headers:apiHeaders(),body:JSON.stringify({fields:toFields(data)})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
  const d=await r.json();
  S.cards.push({id:d.id,...data});
  render();toast('Card creata ✓');
}

async function updateCard(id,data){
  const idx=S.cards.findIndex(c=>c.id===id);
  if(idx>=0)S.cards[idx]={...S.cards[idx],...data};
  render();
  if(!isConfigured()){toast('Salvato in locale');return;}
  const r=await fetch(`${apiBase()}/${id}`,{method:'PATCH',headers:apiHeaders(),body:JSON.stringify({fields:toFields(data)})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
  toast('Salvato ✓');
}

async function deleteCard(id){
  const r=await fetch(`${apiBase()}/${id}`,{method:'DELETE',headers:apiHeaders()});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
  S.cards=S.cards.filter(c=>c.id!==id);
  S.modal=null;render();toast('Card eliminata');
}

function toFields(d){
  return{Title:d.title,Column:d.col,Owner:d.owner,Due:d.due||'',Start:d.start||'',Tags:d.tags.join(','),Subtasks:JSON.stringify(d.subtasks)};
}

function uid(){return 'x'+Math.random().toString(36).slice(2,9)}
function fmt(d){if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1]}
function isOverdue(d){if(!d)return false;return new Date(d)<new Date(new Date().toDateString())}
function ownerById(id){return S.owners.find(o=>o.id===id)||S.owners[0]}
function doneRatio(subs){if(!subs||!subs.length)return null;return{d:subs.filter(s=>s.done).length,t:subs.length}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
function tagBar(tags){if(!tags||!tags.length)return'#888';const t=tagById(tags[0]);return t?t.color:'#888'}

function todayStr(){return new Date().toISOString().slice(0,10)}
function addDays(dateStr,n){const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/(86400000))}

function render(){
  document.getElementById('root').innerHTML=buildHTML();
  bindEvents();
}

function buildHTML(){
  const total=S.cards.length;
  const done=S.cards.filter(c=>c.col==='done').length;
  const overdue=S.cards.filter(c=>c.col!=='done'&&isOverdue(c.due)).length;
  const inprog=S.cards.filter(c=>c.col==='doing').length;
  return`
  ${buildTopbar()}
  ${!isConfigured()?buildConfigBanner():''}
  ${S.error?`<div class="error-banner">⚠ Errore Airtable: ${S.error} — <button class="btn btn-sm" onclick="fetchCards()" style="margin-left:8px">Riprova</button></div>`:''}
  ${S.view==='settings'?buildSettings():S.view==='gantt'?buildGantt():buildBoard(total,done,overdue,inprog)}
  ${S.modal?buildModal():''}
  `;
}

function buildTopbar(){
  const v=S.view;
  return`<div class="topbar">
    <div class="logo">
      <div class="logo-sq"><svg viewBox="0 0 13 13"><rect x="1" y="1" width="4" height="4" rx="1"/><rect x="1" y="7" width="4" height="4" rx="1"/><rect x="7" y="1" width="4" height="4" rx="1"/><rect x="7" y="7" width="4" height="4" rx="1"/></svg></div>
      TeamFlow
    </div>
    <div class="topbar-right">
      <div class="avatars">${S.owners.map(o=>`<div class="av" data-name="${o.name}" style="background:${o.bg};color:${o.color}">${o.initials}</div>`).join('')}</div>
      ${v!=='settings'?`<div class="view-toggle">
        <button class="view-btn${v==='board'?' active':''}" onclick="setView('board')">Kanban</button>

function buildCard(c){
  const o=ownerById(c.owner);
  const ratio=doneRatio(c.subtasks);
  const od=isOverdue(c.due)&&c.col!=='done';
  const exp=S.expanded[c.id];
  const pct=ratio?Math.round(ratio.d/ratio.t*100):0;
  return`<div class="card${c.col==='done'?' done-card':''}" data-id="${c.id}" draggable="true">
    <div class="card-top">
      <div class="card-title">${c.title}</div>
      <button class="card-edit" onclick="openEdit('${c.id}')">⋯</button>
    </div>
    ${c.tags.length?`<div class="tags">${c.tags.map(t=>{const tg=tagById(t);if(!tg)return'';const cs=tagCss(tg.color);return`<span class="tag" style="background:${cs.bg};color:${cs.text}">${tg.label}</span>`;}).join('')}</div>`:''}
    ${ratio!==null?`<div class="sub-bar">
      <div class="sub-track"><div class="sub-fill" style="width:${pct}%"></div></div>
      <div class="sub-meta">
        <div class="sub-label">${ratio.d}/${ratio.t} subtask</div>
        <button class="expand-btn" onclick="toggleExp('${c.id}')">
          <svg width="9" height="9" viewBox="0 0 9 9" style="transition:transform .2s;transform:rotate(${exp?90:0}deg)"><path d="M2.5 1.5l4 3-4 3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ${exp?'nascondi':'mostra'}

      <div class="subtasks-list${exp?' open':''}">
        ${c.subtasks.map(s=>`<div class="sub-item${s.done?' done':''}">
          <div class="sub-check${s.done?' done':''}" data-cid="${c.id}" data-sid="${s.id}">${s.done?'✓':''}</div>
          <span class="sub-text">${s.text}</span>
        </div>`).join('')}
      </div>
    </div>`:''}

  </div>`;
}

// ── GANTT ──────────────────────────────────────────────────────────────────
function buildGantt(){
  if(S.loading)return`<div class="loading"><div class="spinner"></div> Carico da Airtable...</div>`;

  // default range: today → +30 days
  const rangeStart=S.ganttStart||todayStr();
  const rangeEnd=S.ganttEnd||addDays(rangeStart,30);

  // only cards with both start and due, due >= rangeStart, start <= rangeEnd
  const visible=S.cards.filter(c=>c.start&&c.due&&c.start<=rangeEnd&&c.due>=rangeStart);

  const totalDays=diffDays(rangeStart,rangeEnd)+1;
  const DAY_W=Math.max(28, Math.min(44, Math.floor(800/totalDays)));

  // build day columns array
  const days=[];
  for(let i=0;i<totalDays;i++){
    const d=addDays(rangeStart,i);
    const dt=new Date(d);
    const dow=dt.getDay();
    days.push({date:d,label:String(dt.getDate()),isWeekend:dow===0||dow===6,isToday:d===todayStr(),month:dt.getMonth(),year:dt.getFullYear()});
  }

  // month labels
  const months=[];
  days.forEach((d,i)=>{
    if(i===0||(i>0&&days[i-1].month!==d.month)){
      const names=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
      months.push({label:names[d.month]+' '+d.year,offset:i*DAY_W});
    }
  });

  const todayOffset=(todayStr()>=rangeStart&&todayStr()<=rangeEnd)?diffDays(rangeStart,todayStr())*DAY_W:-999;

  // unique tags for legend
  const usedTags=new Set(visible.flatMap(c=>c.tags));
  const legendTags=TAGS.filter(t=>usedTags.has(t.id));
  const noTagBar='#888780';

  function barStyle(c){
    const s=c.start<rangeStart?rangeStart:c.start;
    const e=c.due>rangeEnd?rangeEnd:c.due;
    const left=diffDays(rangeStart,s)*DAY_W;
    const width=Math.max(DAY_W,(diffDays(s,e)+1)*DAY_W)-2;
    const color=c.tags.length?tagBar(c.tags):noTagBar;
    return{left,width,color};
  }

  return`<div class="gantt-wrap">
    <div class="gantt-controls">
      <label>Dal</label>
      <input type="date" id="g-start" value="${rangeStart}" onchange="S.ganttStart=this.value;render()">
      <label>al</label>
      <input type="date" id="g-end" value="${rangeEnd}" onchange="S.ganttEnd=this.value;render()">
      <button class="btn btn-sm" onclick="S.ganttStart=todayStr();S.ganttEnd=addDays(todayStr(),30);render()">Questo mese</button>
      <button class="btn btn-sm" onclick="S.ganttStart=todayStr();S.ganttEnd=addDays(todayStr(),90);render()">3 mesi</button>
      <div class="gantt-legend">
        ${legendTags.map(t=>`<div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:${t.color}"></div>${t.label}</div>`).join('')}
        ${usedTags.size===0||[...usedTags].some(t=>!TAGS.find(x=>x.id===t))?`<div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:${noTagBar}"></div>nessun tag</div>`:''}
      </div>
    </div>

    <div class="gantt-container">
      <div class="gantt-header">
        <div class="gantt-label-col">Task</div>
        <div class="gantt-dates-header" style="position:relative;height:36px;overflow:hidden">
          ${months.map(m=>`<div class="gantt-month-label" style="left:${m.offset}px">${m.label}</div>`).join('')}
          <div style="position:absolute;bottom:0;left:0;display:flex">
            ${days.map(d=>`<div class="gantt-day-head${d.isToday?' today-head':''}${d.isWeekend?' weekend':''}" style="width:${DAY_W}px">${d.label}</div>`).join('')}
          </div>
        </div>
      </div>
      ${visible.length===0?`<div class="gantt-empty">Nessuna task con data inizio e scadenza nel periodo selezionato.<br>Aggiungi le date nelle card tramite ⋯.</div>`:''}
      ${visible.map(c=>{
        const o=ownerById(c.owner);
        const bs=barStyle(c);
        const od=isOverdue(c.due)&&c.col!=='done';
        return`<div class="gantt-row">
          <div class="gantt-task-label">
            <div class="gantt-task-name" title="${c.title}">${c.title}</div>
            <div class="gantt-task-meta">
              <div class="mini-av" style="background:${o.bg};color:${o.color};width:16px;height:16px;font-size:7px">${o.initials}</div>
              ${c.tags.slice(0,2).map(t=>{const tg=tagById(t);if(!tg)return'';const cs=tagCss(tg.color);return`<span class="tag" style="background:${cs.bg};color:${cs.text};padding:1px 5px;font-size:10px">${tg.label}</span>`;}).join('')}
            </div>
          </div>
          <div class="gantt-track" style="width:${totalDays*DAY_W}px;overflow:hidden;position:relative">
            ${days.map((d,i)=>`<div class="gantt-day-col${d.isWeekend?' weekend':''}${d.isToday?' today-col':''}" style="left:${i*DAY_W}px;width:${DAY_W}px"></div>`).join('')}
            ${todayOffset>=0?`<div class="gantt-today-line" style="left:${todayOffset}px"></div>`:''}
            <div class="gantt-bar${c.col==='done'?' done-bar':''}"
              style="left:${bs.left+2}px;width:${bs.width}px;background:${bs.color}"
              onclick="openEdit('${c.id}')"
              title="${c.title} · ${fmt(c.start)} → ${fmt(c.due)}">
              ${bs.width>60?c.title:''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── Events ─────────────────────────────────────────────────────────────────
function bindEvents(){
  // drag & drop (kanban only)
  document.querySelectorAll('.card[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      dragSrcId=el.dataset.id;
      setTimeout(()=>el.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('dragging'));
      dragSrcId=null;
    });
  });
  document.querySelectorAll('.col-body').forEach(col=>{
    const colId=col.dataset.col;
    col.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',async e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(!dragSrcId)return;
      const card=S.cards.find(c=>c.id===dragSrcId);
      if(card&&card.col!==colId){card.col=colId;render();try{await updateCard(card.id,card)}catch(err){toast('Errore: '+err.message)}}
      dragSrcId=null;
    });
  });

  // subtask toggle on board
  document.querySelectorAll('.sub-check[data-cid]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const card=S.cards.find(c=>c.id===el.dataset.cid);
      const sub=card?.subtasks.find(s=>s.id===el.dataset.sid);
      if(!sub)return;
      sub.done=!sub.done;render();
      try{await updateCard(card.id,card)}catch(err){toast('Errore: '+err.message)}
    });
  });

  // modal
  const bg=document.getElementById('modal-bg');
  if(bg)bg.addEventListener('click',e=>{if(e.target===bg){S.modal=null;S.draft=null;render()}});
  bind('cancel-btn','click',()=>{S.modal=null;S.draft=null;render()});
  bind('save-btn','click',()=>handleSave());
  bind('del-btn','click',async()=>{if(confirm('Eliminare questa card?'))await deleteCard(S.modal.id)});
  bind('sub-add-btn','click',addSubtask);
  bind('sub-input','keydown',e=>{if(e.key==='Enter')addSubtask()});

  document.querySelectorAll('.tag-opt[data-tag]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.tag;
      if(S.draft.tags.includes(t))S.draft.tags=S.draft.tags.filter(x=>x!==t);
      else S.draft.tags=[...S.draft.tags,t];
      el.classList.toggle('sel');
    });
  });
  document.querySelectorAll('.modal-sub-check[data-sid]').forEach(el=>{
    el.addEventListener('click',()=>{const sub=S.draft.subtasks.find(s=>s.id===el.dataset.sid);if(sub){sub.done=!sub.done;render()}});
  });
  document.querySelectorAll('[data-delsub]').forEach(el=>{
    el.addEventListener('click',()=>{S.draft.subtasks=S.draft.subtasks.filter(s=>s.id!==el.dataset.delsub);render()});
  });

  // settings
  bind('save-cfg-btn','click',()=>{
    const token=document.getElementById('cfg-token')?.value.trim();
    const baseId=document.getElementById('cfg-base')?.value.trim();
    const tableName=document.getElementById('cfg-table')?.value.trim()||'Tasks';
    saveCfg({token,baseId,tableName});
    S.owners.forEach(o=>{const el=document.getElementById('owner-name-'+o.id);if(el)o.name=el.value.trim()||o.name});
    localStorage.setItem('tf_owners',JSON.stringify(S.owners));
    toast('Configurazione salvata!');S.view='board';fetchCards();
  });
  bind('back-btn','click',()=>{S.view='board';render()});

  // tag management in settings
  bind('add-tag-btn','click',()=>{
    TAGS=[...TAGS,{id:uid(),label:'nuovo tag',color:'#888780'}];
    saveTags();render();
    setTimeout(()=>{
      const inputs=document.querySelectorAll('.tag-label-inp');
      if(inputs.length)inputs[inputs.length-1].select();
    },50);
  });
  document.querySelectorAll('.tag-label-inp').forEach(el=>{
    el.addEventListener('input',()=>{const i=+el.dataset.ti;TAGS[i].label=el.value;saveTags();});
  });
  document.querySelectorAll('.tag-color-inp').forEach(el=>{
    el.addEventListener('input',()=>{const i=+el.dataset.ti;TAGS[i].color=el.value;saveTags();});
  });
  document.querySelectorAll('.tag-del-btn').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=+el.dataset.ti;
      if(TAGS.length<=1){toast('Mantieni almeno un tag');return;}
      TAGS=TAGS.filter((_,idx)=>idx!==i);
      saveTags();render();
    });
  });
}

function bind(id,ev,fn){const el=document.getElementById(id);if(el)el.addEventListener(ev,fn)}

function addSubtask(){
  const inp=document.getElementById('sub-input');
  const txt=inp?.value.trim();
  if(!txt)return;
  S.draft.subtasks=[...S.draft.subtasks,{id:uid(),text:txt,done:false}];
  render();
  setTimeout(()=>{const i=document.getElementById('sub-input');if(i)i.focus()},50);
}

async function handleSave(){
  const title=document.getElementById('f-title')?.value.trim();
  if(!title){toast('Inserisci un titolo');return;}
  S.draft.title=title;
  S.draft.col=document.getElementById('f-col')?.value||S.draft.col;
  S.draft.owner=document.getElementById('f-owner')?.value||S.draft.owner;
  S.draft.start=document.getElementById('f-start')?.value||'';
  S.draft.due=document.getElementById('f-due')?.value||'';
  const isEdit=S.modal&&S.modal.mode==='edit';
  const copy={...S.draft,subtasks:[...(S.draft.subtasks||[])]};
  const copyId=S.draft.id;
  S.modal=null;S.draft=null;
  try{
    if(isEdit)await updateCard(copyId,copy);
    else await createCard(copy);
  }catch(e){toast('Errore: '+e.message);render();}
}

function openNew(col){
  S.draft={col:col||'todo',title:'',tags:[],owner:S.owners[0].id,due:'',start:'',subtasks:[]};
  S.modal={mode:'new'};render();
  setTimeout(()=>document.getElementById('f-title')?.focus(),50);
}
function openEdit(id){
  const card=S.cards.find(c=>c.id===id);
  if(!card)return;
  S.draft={...card,subtasks:[...card.subtasks.map(s=>({...s}))]};
  S.modal={mode:'edit',id};render();
  setTimeout(()=>document.getElementById('f-title')?.focus(),50);
}
