<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamFlow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1EFE8;color:#1a1a1a;min-height:100vh}
:root{--purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;--teal:#0F6E56;--teal-light:#E1F5EE;--blue:#185FA5;--blue-light:#E6F1FB;--amber:#854F0B;--red:#A32D2D;--red-light:#FCEBEB;--border:#e2e0d8;--surface:#F7F6F2}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:#fff;border-bottom:1px solid var(--border);gap:12px;position:sticky;top:0;z-index:20}
.logo{font-size:15px;font-weight:600;color:var(--purple);letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.logo-sq{width:22px;height:22px;background:var(--purple);border-radius:5px;display:flex;align-items:center;justify-content:center}
.logo-sq svg{width:13px;height:13px;fill:#fff}
.topbar-right{display:flex;align-items:center;gap:8px}
.avatars{display:flex}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;border:2px solid #fff;margin-left:-7px;flex-shrink:0;cursor:default;position:relative}
.av:first-child{margin-left:0}
.av[data-name]:hover::after{content:attr(data-name);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:99}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.view-btn{padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;transition:all .12s}
.view-btn.active{background:var(--purple);color:#fff}
.btn{border:1px solid #d0cec8;background:#fff;color:#1a1a1a;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .12s}
.btn:hover{background:#f5f4f0}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-dark);border-color:var(--purple-dark)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:#f0efe9}
.btn-danger{color:var(--red);border-color:#f09595;background:#fff}
.btn-danger:hover{background:var(--red-light)}
.config-bar{background:var(--purple-light);border-bottom:1px solid #c4c0f0;padding:10px 20px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--purple-dark)}
.dash-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px 0}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.stat-val{font-size:24px;font-weight:600}
.board{display:flex;gap:12px;padding:16px 20px 24px;overflow-x:auto;align-items:flex-start}
.col{width:276px;flex-shrink:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column}
.col-head{padding:12px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-title{font-size:13px;font-weight:600;flex:1}
.col-count{font-size:11px;color:#888;background:#fff;border:1px solid var(--border);border-radius:100px;padding:1px 7px;font-weight:500}
.col-body{padding:0 8px 8px;min-height:80px}
.col-body.drag-over{background:rgba(83,74,183,.08);border-radius:8px;outline:2px dashed #AFA9EC;outline-offset:-4px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:grab;transition:border-color .15s,box-shadow .15s;user-select:none}
.card:hover{border-color:#b8b6c8;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.4;transform:scale(.96)}
.card.done-card .card-title{color:#888;text-decoration:line-through}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card-title{font-size:13px;font-weight:500;line-height:1.45;flex:1}
.card-edit{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#bbb;font-size:15px;flex-shrink:0;transition:all .12s;border:none;background:transparent}
.card-edit:hover{background:#f0efe9;color:#555}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.tag{padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500}
.dep-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;background:#FEF3E2;color:#854F0B;border:1px solid #FAC775;margin-bottom:7px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dep-badge.blocked{background:var(--red-light);color:var(--red);border-color:#f09595}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.owner-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.mini-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;flex-shrink:0}
.date-chip{font-size:11px;color:#888}
.date-overdue{color:var(--red);font-weight:600}
.sub-bar{margin-top:8px}
.sub-track{height:3px;background:#ece9df;border-radius:2px;margin-bottom:4px}
.sub-fill{height:3px;border-radius:2px;background:var(--teal);transition:width .3s}
.sub-meta{display:flex;align-items:center;justify-content:space-between}
.sub-label{font-size:11px;color:#aaa}
.expand-btn{font-size:11px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:2px;background:none;border:none;font-family:inherit;padding:0}
.expand-btn:hover{color:#666}
.subtasks-list{margin-top:6px;border-top:1px solid #f0efe9;padding-top:6px;display:none}
.subtasks-list.open{display:block}
.sub-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;color:#666}
.sub-check{width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:8px;background:#fff;transition:all .12s}
.sub-check.done{background:var(--teal);border-color:var(--teal);color:#fff}
.sub-item.done .sub-text{text-decoration:line-through;color:#bbb}
.add-card-btn{margin:4px 8px 8px;padding:8px;border-radius:8px;border:1px dashed #ccc;font-size:12px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;background:transparent;font-family:inherit;width:calc(100% - 16px)}
.add-card-btn:hover{background:#fff;color:#666;border-color:#aaa}
.gantt-wrap{padding:16px 20px 24px}
.gantt-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.gantt-controls label{font-size:12px;color:#888;font-weight:500}
.gantt-controls input[type=date]{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;color:#1a1a1a}
.gantt-legend{display:flex;flex-wrap:wrap;gap:10px;margin-left:auto}
.gantt-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.gantt-legend-dot{width:10px;height:10px;border-radius:3px}
.gantt-container{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:auto}
.gantt-inner{display:inline-flex;flex-direction:column;min-width:100%}
.gantt-header{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;background:#fff}
.gantt-label-col{width:230px;flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;border-right:1px solid var(--border);background:var(--surface)}
.gantt-dates-header{position:relative;background:var(--surface);height:36px;flex-shrink:0}
.gantt-day-head{position:absolute;bottom:0;text-align:center;font-size:10px;color:#aaa;padding:2px 0;border-right:1px solid #f0efe9;font-weight:500}
.gantt-day-head.today-head{color:var(--purple);font-weight:700}
.gantt-month-label{position:absolute;top:2px;font-size:10px;font-weight:600;color:#aaa;padding:0 5px;pointer-events:none;white-space:nowrap}
.gantt-row{display:flex;border-bottom:1px solid #f5f4f0;align-items:stretch;min-width:100%}
.gantt-row:last-child{border-bottom:none}
.gantt-row.task-row:hover{background:#faf9f6}
.gantt-row.sub-row{background:#fafaf8}
.gantt-row.sub-row:hover{background:#f5f4f0}
.gantt-task-label{width:230px;flex-shrink:0;padding:8px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:3px}
.gantt-row.sub-row .gantt-task-label{padding-left:28px}
.g-expand{width:16px;height:16px;border:1px solid #ddd;border-radius:3px;font-size:9px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:#fff;margin-right:3px;color:#888;transition:all .12s}
.g-expand:hover{background:#f0efe9}
.gantt-task-name{font-size:12px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px}
.gantt-sub-name{font-size:11px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-task-meta{display:flex;align-items:center;gap:4px;margin-top:2px}
.gantt-track{flex-shrink:0;position:relative}
.g-bar{position:absolute;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter .12s;top:50%;transform:translateY(-50%)}
.g-bar:hover{filter:brightness(.9)}
.g-bar.done-bar{opacity:.45}
.g-bar.sub-g{border-radius:3px;height:12px;opacity:.85;cursor:default}
.g-today{position:absolute;top:0;bottom:0;width:2px;background:var(--purple);opacity:.3;pointer-events:none;z-index:2}
.g-col{position:absolute;top:0;bottom:0;border-right:1px solid #f5f4f0}
.g-col.we{background:#faf9f6}
.g-col.td{background:rgba(83,74,183,.04)}
.gantt-empty{padding:40px;text-align:center;color:#aaa;font-size:13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;padding:26px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px}
.form-group{margin-bottom:13px}
.form-label{font-size:11px;color:#888;font-weight:600;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-input{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;transition:border-color .12s}
.form-input:focus{outline:none;border-color:var(--purple)}
.tag-picker{display:flex;flex-wrap:wrap;gap:6px}
.tag-opt{padding:3px 10px;border-radius:100px;font-size:12px;cursor:pointer;border:2px solid transparent;font-weight:500;transition:border-color .12s,opacity .12s;opacity:.7}
.tag-opt.sel{border-color:currentColor;opacity:1}
.sub-input-row{display:flex;gap:6px;margin-top:8px}
.sub-input-row input{flex:1;padding:6px 9px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;color:#1a1a1a;font-family:inherit}
.sub-input-row input:focus{outline:none;border-color:var(--purple)}
.sub-input-row button{padding:6px 11px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit}
.sub-input-row button:hover{background:#f5f4f0}
.modal-sub-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f4f0}
.modal-sub-item:last-child{border-bottom:none}
.modal-sub-check{width:15px;height:15px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;background:#fff}
.modal-sub-check.done{background:var(--teal);border-color:var(--teal);color:#fff}
.modal-sub-text{flex:1;font-size:13px;min-width:0}
.modal-sub-dates{display:flex;gap:3px;align-items:center;flex-shrink:0}
.modal-sub-dates input{width:110px;padding:3px 5px;border:1px solid #ddd;border-radius:5px;font-size:11px;font-family:inherit;color:#1a1a1a;background:#fff}
.modal-sub-dates input:focus{outline:none;border-color:var(--purple)}
.modal-sub-del{width:20px;height:20px;border:none;background:none;cursor:pointer;color:#ccc;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
.modal-sub-del:hover{background:#f5f4f0;color:#888}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:14px;border-top:1px solid #f0efe9}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:#aaa;font-size:14px;gap:8px}
.spinner{width:18px;height:18px;border:2px solid #ddd;border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.error-banner{background:var(--red-light);border:1px solid #f09595;color:var(--red);padding:10px 20px;font-size:13px;display:flex;align-items:center;gap:8px}
.settings-section{padding:20px;max-width:520px}
.settings-section h2{font-size:15px;font-weight:600;margin-bottom:10px}
.settings-section p{font-size:13px;color:#666;margin-bottom:10px;line-height:1.6}
.settings-section code{background:#f5f4f0;padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace}
.si-row{display:flex;gap:8px;margin-bottom:8px}
.si-row input{flex:1;padding:8px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}
.si-row input:focus{outline:none;border-color:var(--purple)}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const COLS=[
  {id:'todo',   title:'Da fare',  color:'#888780'},
  {id:'doing',  title:'In corso', color:'#185FA5'},
  {id:'blocked',title:'Bloccate', color:'#A32D2D'},
  {id:'done',   title:'Fatto',    color:'#0F6E56'},
];
const DEFAULT_TAGS=[
  {id:'design', label:'design',    color:'#7F77DD'},
  {id:'dev',    label:'dev',       color:'#378ADD'},
  {id:'mkt',    label:'marketing', color:'#EF9F27'},
  {id:'ops',    label:'ops',       color:'#1D9E75'},
  {id:'urgent', label:'urgente',   color:'#E24B4A'},
];
let TAGS=[...DEFAULT_TAGS];
const DEFAULT_OWNERS=[
  {id:'owner1',name:'Tu',   initials:'TU',color:'#534AB7',bg:'#EEEDFE'},
  {id:'owner2',name:'Anna', initials:'AN',color:'#185FA5',bg:'#E6F1FB'},
  {id:'owner3',name:'Beppe',initials:'BE',color:'#0F6E56',bg:'#E1F5EE'},
];

function getCfg(){try{return JSON.parse(localStorage.getItem('tf_cfg')||'{}')}catch{return{}}}
function saveCfg(c){localStorage.setItem('tf_cfg',JSON.stringify(c))}
function isConfigured(){const c=getCfg();return !!(c.token&&c.baseId)}
function apiBase(tbl){const c=getCfg();return`https://api.airtable.com/v0/${c.baseId}/${encodeURIComponent(tbl||c.tableName||'Tasks')}`}
function apiHeaders(){const c=getCfg();return{'Authorization':`Bearer ${c.token}`,'Content-Type':'application/json'}}

let S={cards:[],owners:[...DEFAULT_OWNERS],loading:true,error:null,modal:null,expanded:{},ganttExp:{},view:'board',draft:null,ganttStart:'',ganttEnd:''};
let dragSrcId=null;

function uid(){return 'x'+Math.random().toString(36).slice(2,9)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function fmt(d){if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1]}
function isOverdue(d){if(!d)return false;return new Date(d)<new Date(new Date().toDateString())}
function sortCardsByDue(cards){
  const today=new Date(new Date().toDateString());
  return [...cards].sort((a,b)=>{
    const hasDueA=!!a.due,hasDueB=!!b.due;
    if(!hasDueA&&!hasDueB)return 0;
    if(!hasDueA)return 1;
    if(!hasDueB)return -1;
    const dA=new Date(a.due),dB=new Date(b.due);
    const odA=dA<today,odB=dB<today;
    // overdue first (oldest first), then future (nearest first), then no date
    if(odA&&odB)return dA-dB;
    if(odA)return -1;
    if(odB)return 1;
    return dA-dB;
  });
}
function ownerById(id){return S.owners.find(o=>o.id===id)||S.owners[0]}
function tagById(id){return TAGS.find(t=>t.id===id)}
function tagCss(color){const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);return{bg:`rgba(${r},${g},${b},0.13)`,text:color}}
function tagBar(tags){if(!tags||!tags.length)return'#B4B2A9';const t=tagById(tags[0]);return t?t.color:'#B4B2A9'}
function doneRatio(subs){if(!subs||!subs.length)return null;return{d:subs.filter(s=>s.done).length,t:subs.length}}
function cardById(id){return S.cards.find(c=>c.id===id)}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600)}
function bind(id,ev,fn){const el=document.getElementById(id);if(el)el.addEventListener(ev,fn)}

function subField(f){return f.Subtasks||f.subtasks||f.Subtask||f.subtask||''}
function toFields(d){
  return{Title:d.title,Column:d.col,Owner:d.owner,Due:d.due||'',Start:d.start||'',
    Tags:(d.tags||[]).join(','),Subtasks:JSON.stringify(d.subtasks||[]),DependsOn:d.dependsOn||'',
    Notes:JSON.stringify(d.notes||[])};
}

async function fetchCards(){
  if(!isConfigured()){S.loading=false;S.view='settings';render();return}
  S.loading=true;render();
  try{
    let all=[],offset=null;
    do{
      const url=apiBase()+(offset?`?offset=${offset}`:'');
      const r=await fetch(url,{headers:apiHeaders()});
      if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
      const d=await r.json();all=[...all,...d.records];offset=d.offset||null;
    }while(offset);
    S.cards=all.map(rec=>{
      let subs=[];const raw=subField(rec.fields);
      if(raw){try{subs=JSON.parse(raw)}catch{}}
      return{id:rec.id,title:rec.fields.Title||'',col:rec.fields.Column||'todo',
        owner:rec.fields.Owner||'owner1',due:rec.fields.Due||'',start:rec.fields.Start||'',
        tags:(rec.fields.Tags||'').split(',').filter(Boolean),subtasks:subs,
        dependsOn:rec.fields.DependsOn||'',
        notes:rec.fields.Notes?JSON.parse(rec.fields.Notes):[]};
    });
    S.error=null;
  }catch(e){S.error=e.message}
  S.loading=false;render();
}

async function createCard(data){
  if(!isConfigured()){S.cards.push({id:uid(),...data});render();toast('Card creata (locale)');return;}
  const r=await fetch(apiBase(),{method:'POST',headers:apiHeaders(),body:JSON.stringify({fields:toFields(data)})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
  const d=await r.json();S.cards.push({id:d.id,...data});render();toast('Card creata ✓');
}

async function updateCard(id,data){
  const idx=S.cards.findIndex(c=>c.id===id);
  if(idx>=0)S.cards[idx]={...S.cards[idx],...data};
  render();
  if(!isConfigured()){toast('Salvato in locale');return;}
  const r=await fetch(`${apiBase()}/${id}`,{method:'PATCH',headers:apiHeaders(),body:JSON.stringify({fields:toFields(data)})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
  toast('Salvato ✓');
}

async function deleteCard(id){
  if(!isConfigured()){S.cards=S.cards.filter(c=>c.id!==id);S.modal=null;render();toast('Eliminata');return;}
  const r=await fetch(`${apiBase()}/${id}`,{method:'DELETE',headers:apiHeaders()});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.statusText)}
  S.cards=S.cards.filter(c=>c.id!==id);S.modal=null;render();toast('Card eliminata');
}

async function fetchSettings(){
  if(!isConfigured())return;
  try{
    const r=await fetch(apiBase('Settings'),{headers:apiHeaders()});
    if(!r.ok)return;
    const d=await r.json();
    d.records.forEach(rec=>{
      if(rec.fields.Key==='owners'){try{S.owners=JSON.parse(rec.fields.Value)}catch{}}
      if(rec.fields.Key==='tags'){try{TAGS=JSON.parse(rec.fields.Value)}catch{}}
    });
    if(d.records.length){
      localStorage.setItem('tf_owners',JSON.stringify(S.owners));
      localStorage.setItem('tf_tags',JSON.stringify(TAGS));
    }
  }catch{}
}

async function pushSettings(){
  if(!isConfigured())return;
  try{
    const r=await fetch(apiBase('Settings'),{headers:apiHeaders()});
    const existing=r.ok?(await r.json()).records:[];
    const upsert=async(key,value)=>{
      const rec=existing.find(x=>x.fields.Key===key);
      const body=JSON.stringify({fields:{Key:key,Value:JSON.stringify(value)}});
      if(rec){await fetch(`${apiBase('Settings')}/${rec.id}`,{method:'PATCH',headers:apiHeaders(),body});}
      else{await fetch(apiBase('Settings'),{method:'POST',headers:apiHeaders(),body});}
    };
    await upsert('owners',S.owners);
    await upsert('tags',TAGS);
  }catch(e){toast('Errore sync settings: '+e.message)}
}

function buildCard(c){

function buildGantt(){
  if(S.loading)return`<div class="loading"><div class="spinner"></div> Carico...</div>`;
  const rs=S.ganttStart||todayStr(),re=S.ganttEnd||addDays(todayStr(),30);
  const totalDays=diffDays(rs,re)+1,DAY_W=Math.max(22,Math.min(38,Math.floor(720/totalDays)));
  const visible=S.cards.filter(c=>c.start&&c.due&&c.start<=re&&c.due>=rs);
  const usedTags=new Set(visible.flatMap(c=>c.tags));

  const days=[];
  for(let i=0;i<totalDays;i++){
    const d=addDays(rs,i),dt=new Date(d),dow=dt.getDay();
    days.push({date:d,label:String(dt.getDate()),we:dow===0||dow===6,today:d===todayStr(),month:dt.getMonth(),year:dt.getFullYear()});
  }
  const months=[];
  days.forEach((d,i)=>{if(i===0||days[i-1].month!==d.month){const nm=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];months.push({label:nm[d.month]+' '+d.year,off:i*DAY_W})}});
  const todayOff=(todayStr()>=rs&&todayStr()<=re)?diffDays(rs,todayStr())*DAY_W:-9999;
  const W=totalDays*DAY_W;

  function bp(s,e){const cs=s<rs?rs:s,ce=e>re?re:e;return{l:diffDays(rs,cs)*DAY_W,w:Math.max(DAY_W-2,(diffDays(cs,ce)+1)*DAY_W-2)}}
  const grid=`${days.map((d,i)=>`<div class="g-col${d.we?' we':''}${d.today?' td':''}" style="left:${i*DAY_W}px;width:${DAY_W}px"></div>`).join('')}<div class="g-today" style="left:${todayOff}px"></div>`;

  const rows=visible.map(c=>{
    const color=tagBar(c.tags),{l,w}=bp(c.start,c.due),exp=S.ganttExp[c.id];
    const hasSubs=c.subtasks&&c.subtasks.some(s=>s.start&&s.due);
    const o=ownerById(c.owner);
    let html=`<div class="gantt-row task-row">
      <div class="gantt-task-label">
        <div class="gantt-task-name">${hasSubs?`<span class="g-expand" onclick="toggleGanttExp('${c.id}')">${exp?'▾':'▸'}</span>`:'<span style="width:19px;display:inline-block"></span>'}<span style="overflow:hidden;text-overflow:ellipsis">${c.title}</span></div>
        <div class="gantt-task-meta"><div class="mini-av" style="background:${o.bg};color:${o.color};width:15px;height:15px;font-size:7px">${o.initials}</div>${c.tags.slice(0,2).map(t=>{const tg=tagById(t);if(!tg)return'';const cs=tagCss(tg.color);return`<span class="tag" style="background:${cs.bg};color:${cs.text};padding:1px 5px;font-size:10px">${tg.label}</span>`}).join('')}</div>
      </div>
      <div class="gantt-track" style="width:${W}px;height:44px">${grid}<div class="g-bar${c.col==='done'?' done-bar':''}" style="left:${l+1}px;width:${w}px;background:${color};height:20px" onclick="openEdit('${c.id}')" title="${c.title} ${fmt(c.start)}→${fmt(c.due)}">${w>55?c.title:''}</div></div>
    </div>`;
    if(exp){
      c.subtasks.filter(s=>s.start&&s.due&&s.start<=re&&s.due>=rs).forEach(s=>{
        const{l:sl,w:sw}=bp(s.start,s.due);
        html+=`<div class="gantt-row sub-row">
          <div class="gantt-task-label"><div class="gantt-sub-name">↳ ${s.text}</div><div style="font-size:10px;color:#aaa">${fmt(s.start)} → ${fmt(s.due)}</div></div>
          <div class="gantt-track" style="width:${W}px;height:34px">${grid}<div class="g-bar sub-g${s.done?' done-bar':''}" style="left:${sl+1}px;width:${sw}px;background:${color}" title="${s.text}"></div></div>
        </div>`;
      });
    }
    return html;
  }).join('');

  return`<div class="gantt-wrap">
    <div class="gantt-controls">
      <label>Dal</label><input type="date" value="${rs}" onchange="S.ganttStart=this.value;render()">
      <label>al</label><input type="date" value="${re}" onchange="S.ganttEnd=this.value;render()">
      <button class="btn btn-sm" onclick="S.ganttStart=todayStr();S.ganttEnd=addDays(todayStr(),30);render()">30 giorni</button>
      <button class="btn btn-sm" onclick="S.ganttStart=todayStr();S.ganttEnd=addDays(todayStr(),90);render()">3 mesi</button>
      <div class="gantt-legend">${TAGS.filter(t=>usedTags.has(t.id)).map(t=>`<div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:${t.color}"></div>${t.label}</div>`).join('')}</div>
    </div>
    <div class="gantt-container">
      <div class="gantt-inner">
        <div class="gantt-header">
          <div class="gantt-label-col">Task</div>
          <div class="gantt-dates-header" style="width:${W}px">
            ${months.map(m=>`<div class="gantt-month-label" style="left:${m.off}px">${m.label}</div>`).join('')}
            ${days.map((d,i)=>`<div class="gantt-day-head${d.today?' today-head':''}${d.we?' weekend':''}" style="width:${DAY_W}px;left:${i*DAY_W}px">${d.label}</div>`).join('')}
          </div>
        </div>
        ${visible.length===0?`<div class="gantt-empty">Nessuna task con data inizio e scadenza nel periodo.<br>Usa ⋯ sulle card per aggiungere le date.</div>`:rows}
      </div>
    </div>
  </div>`;
}

function bindEvents(){
  document.querySelectorAll('.card[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSrcId=el.dataset.id;setTimeout(()=>el.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move'});
    el.addEventListener('dragend',()=>{document.querySelectorAll('.card').forEach(c=>c.classList.remove('dragging'));dragSrcId=null});
  });
  document.querySelectorAll('.col-body').forEach(col=>{
    const colId=col.dataset.col;
    col.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));col.classList.add('drag-over')});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',async e=>{
      e.preventDefault();col.classList.remove('drag-over');if(!dragSrcId)return;
      const card=S.cards.find(c=>c.id===dragSrcId);
      if(card&&card.col!==colId){card.col=colId;render();try{await updateCard(card.id,card)}catch(err){toast('Errore: '+err.message)}}
      dragSrcId=null;
    });
  });
  document.querySelectorAll('.sub-check[data-cid]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const card=S.cards.find(c=>c.id===el.dataset.cid),sub=card?.subtasks.find(s=>s.id===el.dataset.sid);
      if(!sub)return;sub.done=!sub.done;render();try{await updateCard(card.id,card)}catch(err){toast('Errore: '+err.message)}
    });
  });
  const bg=document.getElementById('modal-bg');
  if(bg)bg.addEventListener('click',e=>{if(e.target===bg){S.modal=null;S.draft=null;render()}});
  bind('cancel-btn','click',()=>{S.modal=null;S.draft=null;render()});
  bind('save-btn','click',()=>handleSave());
  bind('del-btn','click',async()=>{if(confirm('Eliminare questa card?'))await deleteCard(S.modal.id)});
  bind('sub-add-btn','click',addSubtask);
  bind('sub-input','keydown',e=>{if(e.key==='Enter')addSubtask()});
  document.querySelectorAll('.tag-opt[data-tag]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.tag;
      if(S.draft.tags.includes(t))S.draft.tags=S.draft.tags.filter(x=>x!==t);
      else S.draft.tags=[...S.draft.tags,t];
      el.classList.toggle('sel');
    });
  });
  document.querySelectorAll('.modal-sub-check[data-sid]').forEach(el=>{
    el.addEventListener('click',()=>{const sub=S.draft.subtasks.find(s=>s.id===el.dataset.sid);if(sub){sub.done=!sub.done;render()}});
  });
  document.querySelectorAll('[data-delsub]').forEach(el=>{
    el.addEventListener('click',()=>{S.draft.subtasks=S.draft.subtasks.filter(s=>s.id!==el.dataset.delsub);render()});
  });
  document.querySelectorAll('.ssi').forEach(el=>{el.addEventListener('change',()=>{const sub=S.draft.subtasks.find(s=>s.id===el.dataset.sid);if(sub)sub.start=el.value})});
  document.querySelectorAll('.sdi').forEach(el=>{el.addEventListener('change',()=>{const sub=S.draft.subtasks.find(s=>s.id===el.dataset.sid);if(sub)sub.due=el.value})});
  bind('save-cfg-btn','click',async()=>{
    const token=document.getElementById('cfg-token')?.value.trim();
    const baseId=document.getElementById('cfg-base')?.value.trim();
    const tableName=document.getElementById('cfg-table')?.value.trim()||'Tasks';
    saveCfg({token,baseId,tableName});
    S.owners.forEach(o=>{const el=document.getElementById('owner-name-'+o.id);if(el)o.name=el.value.trim()||o.name});
    document.querySelectorAll('.tag-label-inp').forEach(el=>{const i=+el.dataset.ti;if(TAGS[i])TAGS[i].label=el.value});
    document.querySelectorAll('.tag-color-inp').forEach(el=>{const i=+el.dataset.ti;if(TAGS[i])TAGS[i].color=el.value});
    localStorage.setItem('tf_owners',JSON.stringify(S.owners));
    localStorage.setItem('tf_tags',JSON.stringify(TAGS));
    toast('Salvo e sincronizzo...');
    await pushSettings();
    toast('Salvato e sincronizzato ✓');
    S.view='board';fetchCards();
  });
  bind('back-btn','click',()=>{S.view='board';render()});
  bind('add-tag-btn','click',()=>{TAGS=[...TAGS,{id:uid(),label:'nuovo tag',color:'#888780'}];render();setTimeout(()=>{const ins=document.querySelectorAll('.tag-label-inp');if(ins.length)ins[ins.length-1].select()},50)});
  document.querySelectorAll('.tag-label-inp').forEach(el=>{el.addEventListener('input',()=>{const i=+el.dataset.ti;if(TAGS[i])TAGS[i].label=el.value})});
  document.querySelectorAll('.tag-color-inp').forEach(el=>{el.addEventListener('input',()=>{const i=+el.dataset.ti;if(TAGS[i])TAGS[i].color=el.value})});
  document.querySelectorAll('.tag-del-btn').forEach(el=>{el.addEventListener('click',()=>{if(TAGS.length<=1){toast('Mantieni almeno un tag');return;}TAGS=TAGS.filter((_,i)=>i!==+el.dataset.ti);render()})});
}

function addSubtask(){
  const inp=document.getElementById('sub-input'),txt=inp?.value.trim();
  if(!txt)return;
  S.draft.subtasks=[...S.draft.subtasks,{id:uid(),text:txt,done:false,start:'',due:''}];
  render();setTimeout(()=>{const i=document.getElementById('sub-input');if(i)i.focus()},50);
}

async function handleSave(){
  const title=document.getElementById('f-title')?.value.trim();
  if(!title){toast('Inserisci un titolo');return;}
  document.querySelectorAll('.ssi').forEach(el=>{const sub=S.draft.subtasks.find(s=>s.id===el.dataset.sid);if(sub)sub.start=el.value});
  document.querySelectorAll('.sdi').forEach(el=>{const sub=S.draft.subtasks.find(s=>s.id===el.dataset.sid);if(sub)sub.due=el.value});
  S.draft.title=title;
  S.draft.col=document.getElementById('f-col')?.value||S.draft.col;
  S.draft.owner=document.getElementById('f-owner')?.value||S.draft.owner;
  S.draft.start=document.getElementById('f-start')?.value||'';
  S.draft.due=document.getElementById('f-due')?.value||'';
  S.draft.dependsOn=document.getElementById('f-dep')?.value||'';
  const isEdit=S.modal&&S.modal.mode==='edit';
  const copy={...S.draft,subtasks:[...(S.draft.subtasks||[])]};
  const copyId=S.draft.id;
  S.modal=null;S.draft=null;
  try{if(isEdit)await updateCard(copyId,copy);else await createCard(copy);}
  catch(e){toast('Errore: '+e.message);render();}
}

function addNote(){
  const inp=document.getElementById('note-input');
  const txt=inp&&inp.value.trim();
  if(!txt)return;
  const now=new Date();
  const dateStr=now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  if(!S.draft.notes)S.draft.notes=[];
  S.draft.notes.push({id:uid(),text:txt,date:dateStr});
  render();
  setTimeout(()=>{const i=document.getElementById('note-input');if(i)i.focus()},50);
}

function openNew(col){S.draft={col:col||'todo',title:'',tags:[],owner:S.owners[0].id,due:'',start:'',subtasks:[],dependsOn:'',notes:[]};S.modal={mode:'new'};render();setTimeout(()=>document.getElementById('f-title')?.focus(),50)}
function openEdit(id){const card=S.cards.find(c=>c.id===id);if(!card)return;S.draft={...card,subtasks:card.subtasks.map(s=>({...s}))};S.modal={mode:'edit',id};render();setTimeout(()=>document.getElementById('f-title')?.focus(),50)}
function toggleExp(id){S.expanded[id]=!S.expanded[id];render()}
function toggleGanttExp(id){S.ganttExp[id]=!S.ganttExp[id];render()}
function setView(v){S.view=v;render()}

const _so=localStorage.getItem('tf_owners');if(_so){try{S.owners=JSON.parse(_so)}catch{}}
const _st=localStorage.getItem('tf_tags');if(_st){try{TAGS=JSON.parse(_st)}catch{}}

async function boot(){await fetchSettings();await fetchCards()}
boot();
</script>
</body>
</html>
